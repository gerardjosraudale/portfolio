<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'showcase/styles.css' %}">
</head>
<body>
    <div class="container">
        <h1>Projects</h1>
        <form method="get" class="filter-form">
            <select name="category" onchange="this.form.submit()">
                <option value="">All</option>
                <option value="Web">Web</option>
                <option value="Mobile">Mobile</option>
                <option value="Data Science">Data Science</option>
            </select>
        </form>
        <ul class="projects-list">
            {% for project in projects %}
            <li class="project-item">
                <h2>{{ project.title }}</h2>
                <p>{{ project.description }}</p>
                {% if project.image %}
                <img src="{{ project.image.url }}" alt="{{ project.title }}" class="project-image">
                {% endif %}
                {% if project.link %}
                <p><a href="{{ project.link }}" class="button">View Project</a></p>
                {% endif %}
            </li>
            {% endfor %}
        </ul>
        <p><a href="{% url 'home' %}" class="button">Back to Home</a></p>
    </div>
</body>
</html>
